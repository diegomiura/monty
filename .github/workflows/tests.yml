name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # Data-dependent integration tests skip automatically when no data
      # has been downloaded; all model/leakage tests run on synthetic data.
      - run: python -m pytest tests/ -q
